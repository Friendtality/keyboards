name: Emoticon Creator
attributes: {moreKeyMode: OnlyExplicit}
#rowHeightMode: FillHeight
rows:
  - letters: 
    - [ "(", "\\(", "o(", "o\u0311\u032E(", "o("]
    - [ ")" , ")o", ")/", ")o\u0311\u032E"]
    - [ "[" , "o[", "((o[", "\\[", "/[", "ȏ̮["]
    - [ "]" , "]o", "]o))", "]/", "]\\", "]ȏ̮"]
  - letters:
    - [ "𓆩", "꒰ა"]
    - [ "𓆪", "໒꒱"]
    - $delete
  - bottom:
    - Eyes|!code/key_to_alt_0_layout
    - Mouth|!code/key_to_alt_1_layout
    - Misc|!code/key_to_alt_2_layout
    - $space
  
altPages:
  - - letters: 
      - "O"
      - "U"
      - "T"
      - "@"
      - "*"
      # U+2267 Greater-Than Over Equal To
      # U+2269 GREATER-THAN BUT NOT EQUAL TO
      # U+2273 GREATER-THAN OR EQUIVALENT TO
      - [">" , "\u2267", "\u2269", "\u2273"]
      # U+2266 Less-Than Over Equal To
      # U+2268 LESS-THAN BUT NOT EQUAL TO
      # U+2272 LESS-THAN OR EQUIVALENT TO
      - ["<" , "\u2266", "\u2268", "\u2272"]
    - letters:
      # U+2B24 Black Large Circle
      # U+2B2E Black Vertical Ellipse
      # U+25CFBlack Circle
      - ["\u25CF" , "\u2B2E" , "\u2B24"]
      - $delete
    - bottom:
      - Hands|!code/key_to_alt_0_layout
      - Mouth|!code/key_to_alt_1_layout
      - Misc|!code/key_to_alt_2_layout
      - $space

  - - letters:
      # U+03C9 GREEK SMALL LETTER OMEGA
      - ["w", "\u03C9"]
      - ",.,"
      - "v"
      - "_"
      - "-"
      # U+FE4F Wavy Low Line
      # U+3030 Wavy Dash
      - ["~", "\uFE4F", "\u3030"]
    - bottom: 
      - Eyes|!code/key_to_alt_0_layout
      - Hands|!code/key_to_alt_1_layout
      - Misc |!code/key_to_alt_2_layout
      - $space
      
  - - letters:
      # U+FF61 HALFWIDTH IDEOGRAPHIC FULL STOP
      - "\uFF61"
    - bottom:
      - Eyes|!code/key_to_alt_0_layout
      - Mouth|!code/key_to_alt_1_layout
      - Hands|!code/key_to_alt_2_layout
      - $space